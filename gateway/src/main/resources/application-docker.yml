server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: user-service
          uri: http://127.0.0.1:8081
          predicates:
            - Path=/api/v1/users/**
        - id: auth-service
          uri: http://127.0.0.1:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: approval-service
          uri: http://127.0.0.1:8082
          predicates:
            - Path=/api/v1/approvals/**
        - id: notice-service
          uri: http://127.0.0.1:8083
          predicates:
            - Path=/api/v1/notices/**
        - id: video-service
          uri: http://127.0.0.1:8085
          predicates:
            - Path=/api/v1/video/**

eureka:
  enabled: false
