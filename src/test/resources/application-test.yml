spring:
  application:
    name: openoa-integration-test
  
  # 使用 H2 内存数据库
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
  
  # H2 控制台
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# 服务端口（随机）
server:
  port: 0

# 日志配置
logging:
  level:
    com.openoa: DEBUG
    org.springframework.web: INFO

# 测试专用配置
openoa:
  test:
    enabled: true
    clean-data: true
