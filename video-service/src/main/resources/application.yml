server:
  port: 8085

spring:
  application:
    name: video-service
  autoconfigure:
    exclude:
      - com.alibaba.cloud.nacos.ribbon.NacosRibbonAutoConfiguration
      - com.alibaba.cloud.nacos.discovery.NacosDiscoveryAutoConfiguration
      - com.alibaba.cloud.nacos.config.NacosConfigAutoConfiguration
  cloud:
    discovery:
      enabled: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/openoa_video?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:111111}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.openoa.video.entity
  configuration:
    map-underscore-to-camel-case: true

# Jitsi 配置
jitsi:
  url: ${JITSI_URL:https://meet.example.com}
  api-key: ${JITSI_API_KEY:}
