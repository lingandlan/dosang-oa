server:
  port: 8085

spring:
  application:
    name: video-service
  autoconfigure:
    exclude:
      - com.alibaba.cloud.nacos.ribbon.NacosRibbonAutoConfiguration
      - com.alibaba.cloud.nacos.discovery.NacosDiscoveryAutoConfiguration
      - com.alibaba.cloud.nacos.config.NacosConfigAutoConfiguration
  cloud:
    discovery:
      enabled: false
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
  h2:
    console:
      enabled: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.openoa.video.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# Jitsi 配置
jitsi:
  url: ${JITSI_URL:https://meet.example.com}
  api-key: ${JITSI_API_KEY:}
