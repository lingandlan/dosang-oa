apiVersion: v1
kind: ConfigMap
metadata:
  name: oa-config
  namespace: oa-system
data:
  # 数据库配置
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_NAME: "oa_system"
  DB_USER: "root"
  
  # Redis配置
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  
  # 服务端口
  GATEWAY_PORT: "8080"
  EUREKA_PORT: "8761"
  USER_SERVICE_PORT: "8081"
  APPROVAL_SERVICE_PORT: "8082"
  NOTICE_SERVICE_PORT: "8084"
  VIDEO_SERVICE_PORT: "8085"
  WEBSOCKET_SERVICE_PORT: "8086"
  
  # Spring配置
  SPRING_PROFILES_ACTIVE: "k8s"
